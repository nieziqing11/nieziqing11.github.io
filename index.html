<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1220" />
    <title>Vocab PWA</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">V</div>
        <div class="brandText">
          <div class="title">Vocab</div>
          <div class="subtitle">Spaced repetition</div>
        </div>
      </div>
      <nav class="topActions">
        <a class="chip" href="#share">QR</a>
        <a class="chip" href="#settings">Settings</a>
      </nav>
    </header>

    <main id="app" class="container" role="main"></main>

    <footer class="footer">
      <a href="#home">Home</a>
      <a href="#review">Review</a>
      <a href="#browse">Browse</a>
      <a href="#add">Add</a>
    </footer>

    <script type="module" src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
